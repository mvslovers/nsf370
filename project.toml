[project]
name = "nsf370"
version = "0.1.0-dev"
type = "application"

[build]
# NSF builds warnings-clean. -I include exposes the public headers.
cflags = ["-std=gnu99", "-I", "include"]

[host]
# Fast native inner loop for the portable foundation/protocol tests
# (`make test-host`). NSF_DEBUG=1 turns on the eyecatcher / double-free /
# leak-gate checks (compiled out of production; see nsfmm.c).
cflags = ["-Wall", "-Wextra", "-DNSF_DEBUG=1", "-pthread"]
# MVS-only CSECTs swapped for their host shims so an asm-carrying [[test]] still
# builds and runs natively:
#   nsfxq   -- the exit->mainline handoff (spec 4.2): a CS loop on MVS
#              (asm/nsfxq.asm), a compiler-atomic on the host (src/nsfxq_host.c).
#   nsftime -- the platform seam (spec 7.2): STCK + PSATOLD on MVS
#              (asm/nsftime.asm), gettimeofday + 0 on the host
#              (src/nsftime_host.c). Shared by NSFTRC and NSFTMR.
#   nsfstim -- the NSFTMR arming seam (spec 6.3): STIMER REAL + POST exit on
#              MVS (asm/nsfstim.asm), a no-op that records arms/disarms for the
#              tests on the host (src/nsfstim_host.c). Host drives ticks by
#              calling nsftmr_run directly.
#   nsfevt_plat -- the NSFEVT WAIT/POST seam (spec 5.3): libc370 ecb_waitlist
#              (WAIT ECBLIST) on MVS (src/nsfevt_plat.c), a pthread cond-var on
#              the host (src/nsfevt_plat_host.c) so the loop blocks + wakes.
#   nsfmsg_plat -- the WTO emit seam (M0-8): libc370 wto() on MVS
#              (src/nsfmsg_plat.c), a capture ring + stdout on the host
#              (src/nsfmsg_host.c) so a test can read back operator output.
#   nsfopr_plat -- the operator CIB/QEDIT seam (M0-8): EXTRACT COMM + QEDIT on
#              MVS (src/nsfopr_plat.c), an injectable command queue on the host
#              (src/nsfopr_plat_host.c) so the loop test drives the whole path.
#   nsfhost_plat -- the HOST device driver (M1-2, spec 9.4): the real loopback/
#              TUN driver on the host (src/nsfhost.c, pthread reader thread),
#              a NULL-ops placeholder on MVS (src/nsfhost_plat.c) -- there is no
#              host driver on MVS (use CTCI/LCS), so a test that names it still
#              cross-links, and the host build gets the real driver.
#   nsfctcio -- the CTCI top half (M1-4, spec 9.3): the C-callable EXCP
#              primitives on MVS (asm/nsfctcio.asm), a channel MODEL on the host
#              (src/nsfctcio_host.c: inject inbound blocks, capture outbound,
#              force I/O errors) so the bottom half is host-testable.
#   nsfctci  -- the CTCI channel + SVC 99 seam (M1-4, spec 9.3): the real SVC 99
#              allocate + OPEN on MVS (src/nsfctci.c), a success no-op on the host
#              (src/nsfctci_host.c) -- the host shim MODELS the subchannel, so
#              bringing a device up needs no allocation. The portable bottom half
#              (src/nsfctcib.c) drives ctci_chan_open/close identically on both.
#   nsfthr  -- the I/O-subtask threading seam (M1-4b, spec 9.3 / ADR-0022):
#              libc370 cthread (ATTACH a subtask, SVC-2 POST, WAIT, termecb join)
#              on MVS (src/nsfthr.c), a pthread + condvar on the host
#              (src/nsfthr_host.c) so the SAME CTCI subtask logic runs both ways.
replace = { "asm/nsfxq.asm" = "src/nsfxq_host.c", "asm/nsftime.asm" = "src/nsftime_host.c", "asm/nsfstim.asm" = "src/nsfstim_host.c", "src/nsfevt_plat.c" = "src/nsfevt_plat_host.c", "src/nsfmsg_plat.c" = "src/nsfmsg_host.c", "src/nsfopr_plat.c" = "src/nsfopr_plat_host.c", "src/nsfhost_plat.c" = "src/nsfhost.c", "asm/nsfctcio.asm" = "src/nsfctcio_host.c", "src/nsfctci.c" = "src/nsfctci_host.c", "src/nsfthr.c" = "src/nsfthr_host.c" }

# No mvslovers dependencies yet. libc370 is the cc370 sysroot (provided by
# the toolchain), NOT a project dependency -- same model as rexx370 v2.
[dependencies]

# -- M0-1 build-skeleton smoke test -------------------------------------
# Trivial dual (host + MVS) test proving the toolchain, the base types and
# the NSF_SIZE_ASSERT machinery compile and run (exit 0 = pass, 1 = fail).
# Complemented by the M0-2 foundation unit tests below.
[[test]]
name = "TSTSMOKE"
startup = "crt1"
sources = ["test/tstsmoke.c"]

# -- M0-2 foundation unit tests (NSFQUE / NSFXQ / NSFMM) ----------------
# NSFQUE: FIFO order, q_remove from the middle, bounded reject, Q_ENTRY.
[[test]]
name = "TSTQUE"
startup = "crt1"
sources = ["test/tstque.c", "src/nsfque.c"]

# NSFXQ: exit->mainline handoff push/drain ordering. asm/nsfxq.asm is swapped
# for src/nsfxq_host.c on the host by [host].replace above (on-MVS assembly of
# nsfxq.asm is deferred to M0-6; not part of the M0-2 CI gate).
[[test]]
name = "TSTXQ"
startup = "crt1"
sources = ["test/tstxq.c", "asm/nsfxq.asm"]

# NSFMM: alloc/exhaustion/free, counters, enforcement ABENDs, leak gate.
[[test]]
name = "TSTMM"
startup = "crt1"
sources = ["test/tstmm.c", "src/nsfmm.c", "src/nsfabend.c"]

# -- M0-3 buffer manager unit tests (NSFBUF) ---------------------------
# NSFBUF: class selection at the 192/193 boundary, field init, headroom
# prepend/reject, head/tail trim, chain-aware copyin/copyout, chaining, and
# the two-pool leak gate (buf_free of a mixed chain returns both pools to
# baseline). Links NSFMM + nsf_abend (buf_free routes through mm_free).
[[test]]
name = "TSTBUF"
startup = "crt1"
sources = ["test/tstbuf.c", "src/nsfbuf.c", "src/nsfmm.c", "src/nsfabend.c"]

# -- M0-4 trace + statistics unit tests (NSFTRC / NSFSTS) --------------
# NSFTRC: flag gating through the TRC macro (suppress / record), over-long
# text truncation into the 128 B entry, oldest-first ring wrap with correct
# cursor/count, hexdump formatting, and the NSFTRACE eyecatcher. Links the
# platform seam (asm/nsftime.asm -> src/nsftime_host.c on the host).
[[test]]
name = "TSTTRC"
startup = "crt1"
sources = ["test/tsttrc.c", "src/nsftrc.c", "src/nsffmt.c", "asm/nsftime.asm"]

# libc370 vsnprintf/snprintf toolchain-divergence probe (issue #25.2): TSTTRC's
# over-long-text case caught libc370 NOT NUL-terminating on truncation (a real
# glibc/C99 conformance gap). This is that divergence isolated and pinned in ONE
# place, independent of NSFTRC -- host = false because the divergence is
# invisible on host (a host test would just prove glibc is C99-conformant).
# KEEP even after nsffmt.c lands: the wrapper's contract is built against this.
[[test]]
name = "TSTVSNP"
startup = "crt1"
host = false
sources = ["test/mvs/tstvsnp.c"]

# NSFFMT: the safe formatting seam (nsf_vsnprintf/nsf_snprintf) that fixes the
# TSTVSNP-pinned libc370 gap -- always NUL-terminates on truncation, clamped
# return value. Portable C, dual host+MVS: the wrapper's own clamping logic is
# platform-independent, so this runs and asserts identically both ways.
[[test]]
name = "TSTFMT"
startup = "crt1"
sources = ["test/tstfmt.c", "src/nsffmt.c"]

# NSFSTS: distinct counter registration, STS_INC/STS_ADD, registry overflow,
# reset-to-zero, and the component+name+value render into a caller buffer.
[[test]]
name = "TSTSTS"
startup = "crt1"
sources = ["test/tststs.c", "src/nsfsts.c", "src/nsffmt.c"]

# -- M0-5 timer manager unit tests (NSFTMR) ----------------------------
# NSFTMR: sorted delta-queue insertion order + successor bookkeeping, in-order
# firing as ticks advance, cancel-from-the-middle, restart of a pending timer,
# idempotent cancel, and nsftmr_run re-arm/disarm via the platform-seam probe.
# The arming seam asm/nsfstim.asm is swapped for src/nsfstim_host.c on the host
# ([host].replace above); the host drives ticks by calling nsftmr_run directly.
[[test]]
name = "TSTTMR"
startup = "crt1"
sources = ["test/tsttmr.c", "src/nsftmr.c", "src/nsfque.c", "asm/nsfstim.asm"]

# NSFTMR timer-accuracy job -- the ADR-0011 gate (spec 6.3). MVS-only: it MEASURES
# the STIMER timebase with a task-synchronous STIMER WAIT (test/asm/tststmw.asm),
# timing each 100 ms interval with STCK (asm/nsftime.asm). Standalone: decoupled
# from nsftmr_run AND from the async STIMER-REAL + POST-exit seam (asm/nsfstim.asm,
# whose live run is an M0-6 task). host = false -> skipped by test-host; runs under
# test-mvs and PASSes only if mean in [90,110] ms and no interval > 200 ms.
[[test]]
name = "TSTTMACC"
startup = "crt1"
host = false
sources = ["test/mvs/tsttmacc.c", "asm/nsftime.asm", "test/asm/tststmw.asm"]

# -- M0-6 event dispatcher / main loop (NSFEVT) ------------------------
# NSFEVT: FIFO dispatch order, the drain budget preventing timer starvation, the
# NSFXQ handoff drained from a pthread-simulated exit, and the shutdown leak
# gate. Portable loop + the WAIT/POST seam (src/nsfevt_plat.c swapped for the
# pthread cond-var host shim by [host].replace); timer + xq seams swapped too.
[[test]]
name = "TSTEVT"
startup = "crt1"
sources = ["test/tstevt.c", "src/nsfevt.c", "src/nsfevt_plat.c", "src/nsfmm.c", "src/nsfque.c", "src/nsfabend.c", "src/nsftmr.c", "asm/nsfstim.asm", "asm/nsfxq.asm"]

# NSFEVT on-MVS validation (host = false): the loop WAITs on {timerECB, stopECB},
# the async STIMER exit (asm/nsfstim.asm NSFTMEXP) POSTs timerECB and re-arms, the
# loop observes N timer cycles at ~100 ms, then a simulated stop shuts it down
# cleanly. This is where the async STIMER exit is proven on 3.8j (CC 0 vs S0C6).
[[test]]
name = "TSTEVTM"
startup = "crt1"
host = false
sources = ["test/mvs/tstevtm.c", "src/nsfevt.c", "src/nsfevt_plat.c", "src/nsfmm.c", "src/nsfque.c", "src/nsfabend.c", "src/nsftmr.c", "asm/nsfstim.asm", "asm/nsfxq.asm", "asm/nsftime.asm"]

# -- M0-7 configuration parser (NSFCFG) --------------------------------
# NSFCFG: the PROFILE.TCPIP parser + immutable NSFCFG output struct, driven
# against the test/cfg/ corpus (valid + one broken profile per error class) via
# cfg_load (which also exercises the fopen/fread wrapper). Every statement type
# parses to the expected values; each broken profile asserts rejection with the
# NSF7xx code AND the exact 1-based line; plus dotted-decimal edge cases and
# charset-transparent (code-page-independent) case folding. Pure portable C --
# no asm, no MVS services -- so it runs host + MVS unchanged.
# host-only (issue #25.1): the corpus is loaded from the host-relative path
# test/cfg/, never staged as an MVS dataset, so this can only fail under
# test-mvs; on-MVS coverage of the parser's EBCDIC path is not essential since
# it is already exercised live by the real PROFILE at S NSF.
[[test]]
name = "TSTCFG"
startup = "crt1"
mvs = false
sources = ["test/tstcfg.c", "src/nsfcfg.c", "src/nsffmt.c"]

# -- M0-8 operator dispatcher + startup sequencing (NSFOPR / NSFSTC) -----
# NSFOPR: the portable MODIFY command dispatcher (DISPLAY/STATS/TRACE/STOP/HELP)
# and the operator path THROUGH the real loop -- the host CIB seam
# (src/nsfopr_plat.c -> src/nsfopr_plat_host.c) + WTO seam (src/nsfmsg_plat.c ->
# src/nsfmsg_host.c) are swapped by [host].replace, so a test injects a command,
# posts the console ECB, and asserts evt_mainloop drained + dispatched + shut
# down clean. Pulls the executive + foundation it drives.
[[test]]
name = "TSTOPR"
startup = "crt1"
sources = ["test/tstopr.c", "src/nsfopr.c", "src/nsfopr_plat.c", "src/nsfmsg.c", "src/nsfmsg_plat.c", "src/nsfstc.c", "src/nsfevt.c", "src/nsfevt_plat.c", "src/nsftrc.c", "src/nsfsts.c", "src/nsfbuf.c", "src/nsftmr.c", "src/nsfmm.c", "src/nsfque.c", "src/nsfabend.c", "src/nsffmt.c", "asm/nsfxq.asm", "asm/nsfstim.asm", "asm/nsftime.asm"]

# NSFSTC: the NSFCFG->component-init wiring -- trace-flag mapping, NSFPOOL count
# resolution, cross-statement referential integrity (spec 14.5), and
# nsf_init_from_cfg's success (pools created, leak gate) + refuse-to-start
# failure path (no partial state). Pure portable C over real cfg_parse output.
[[test]]
name = "TSTSTC"
startup = "crt1"
sources = ["test/tststc.c", "src/nsfstc.c", "src/nsfcfg.c", "src/nsftrc.c", "src/nsfbuf.c", "src/nsfmm.c", "src/nsfabend.c", "src/nsffmt.c", "asm/nsftime.asm", "asm/nsfstim.asm"]

# NSFSTC on-MVS component validation (host = false): parse an embedded profile,
# wire it into the component inits on real 3.8j (EBCDIC PDS-independent path,
# real mm_pool_create), allocate + free a buffer, and prove the leak gate + the
# ESTAE establish/delete both link and run on MVS. The full S NSF / F NSF,* /
# P NSF / induced-ABEND-percolate flow is the PROC-driven operator validation
# (jcl/NSFPROC.jcl), which a batch RC test cannot observe.
[[test]]
name = "TSTSTCM"
startup = "crt1"
host = false
sources = ["test/mvs/tststcm.c", "src/nsfstc.c", "src/nsfcfg.c", "src/nsfmsg.c", "src/nsfmsg_plat.c", "src/nsfevt.c", "src/nsfevt_plat.c", "src/nsftrc.c", "src/nsfsts.c", "src/nsfbuf.c", "src/nsftmr.c", "src/nsfmm.c", "src/nsfque.c", "src/nsfabend.c", "src/nsffmt.c", "asm/nsfxq.asm", "asm/nsfstim.asm", "asm/nsftime.asm"]

# -- M1-2 device abstraction + host driver (NSFDEV / NSFHOST) ------------
# NSFDEV: the DEVOPS contract + device table + the async completion handoff
# (device doneq -> EV_PACKET_RECEIVED), driven end-to-end over the HOST loopback
# driver. A pthread reader thread inside src/nsfhost.c is the host analog of the
# CTCI I/O-completion exit (xq_push onto doneq + POST the device ECB), so the
# doneq -> EV_PACKET_RECEIVED integration is validated across a real thread
# boundary; M1-3 swaps only the producer. Sources list src/nsfhost_plat.c (the
# MVS NULL-ops placeholder); [host].replace swaps it for the real src/nsfhost.c
# on the native build. tstdev.c is portable (the pthread is inside nsfhost.c) and
# skips trivially where nsfhost_ops() is NULL (MVS) -- CTCI validates the
# abstraction on MVS (M1-3+).
[[test]]
name = "TSTDEV"
startup = "crt1"
sources = ["test/tstdev.c", "src/nsfhost_plat.c", "src/nsfdev.c", "src/nsfbuf.c", "src/nsfsts.c", "src/nsfevt.c", "src/nsfevt_plat.c", "src/nsfmm.c", "src/nsfque.c", "src/nsftmr.c", "src/nsfabend.c", "src/nsffmt.c", "asm/nsfxq.asm", "asm/nsfstim.asm"]

# -- M1-4 CTCI frame codec (nsfctcif): CTCISEG<->raw IP ----------------------
# Pure portable byte<->byte transform (spec 9.3 / ADR-0020). Literal wire-byte
# vectors for decode AND encode -- a round-trip alone would hide a USHORT-vs-
# byte-wise endianness regression (self-consistent on either box). No device, no
# NSFMM: runs host + MVS unchanged.
[[test]]
name = "TSTCTCIF"
startup = "crt1"
sources = ["test/tstctcif.c", "src/nsfctcif.c"]

# -- M1-4 CTCI bottom half (NSFCTCI): DEVOPS + DEVIO over the host shim -------
# Drives the REAL DEVOPS path (register/start/send/shutdown) and the DEVIO
# completion seam against the host channel MODEL (src/nsfctcio_host.c swaps
# asm/nsfctcio.asm; src/nsfctci_host.c swaps the SVC 99 seam src/nsfctci.c).
# Proves the bottom-half LOGIC -- ping-pong re-drive-before-parse, completion
# demux, decode->PBUF (EV_PACKET_RECEIVED), stale-ECB guard, error re-drive,
# sendq->WRITE framing + single-free ownership, leak gate. A wrong CCW flag is
# caught only by the real device (TSTCTCM on MVSCE).
[[test]]
name = "TSTCTCI"
startup = "crt1"
sources = ["test/tstctci.c", "src/nsfctcib.c", "src/nsfctcif.c", "src/nsfctci.c", "src/nsfthr.c", "asm/nsfctcio.asm", "src/nsfdev.c", "src/nsfbuf.c", "src/nsfsts.c", "src/nsfevt.c", "src/nsfevt_plat.c", "src/nsftrc.c", "src/nsfmsg.c", "src/nsfmsg_plat.c", "src/nsfmm.c", "src/nsfque.c", "src/nsftmr.c", "src/nsfabend.c", "src/nsffmt.c", "asm/nsfxq.asm", "asm/nsfstim.asm", "asm/nsftime.asm"]

# -- M1-3 CTCI top half (NSFCTCI): allocate + open the CUU pair + EXCP --------
# MVS-only (host = false): the driver uses the libc370 SVC 99 dynamic-allocation
# seam and the HLASM EXCP primitives, neither of which exists on the host (there
# is no [host].replace shim -- the whole driver is MVS-only, like nsfmain.c). The
# test runs the SVC 99 seam proof today (invalid unit -> decoded S99 error) and
# carries the DEFERRED EXCP channel path (compiled -> cross-links, executed only
# with -DNSFCTCI_CUU + a live 3088 pair; see the PR runbook). Cross-links clean;
# its EXCP runtime on 3.8j is UNVALIDATED (blocked on the Hercules device).
[[test]]
name = "TSTCTCM"
startup = "crt1"
host = false
sources = ["test/mvs/tstctcm.c", "src/nsfctcib.c", "src/nsfctcif.c", "src/nsfctci.c", "src/nsfthr.c", "asm/nsfctcio.asm", "src/nsfdev.c", "src/nsfbuf.c", "src/nsfsts.c", "src/nsfevt.c", "src/nsfevt_plat.c", "src/nsftrc.c", "src/nsfmsg.c", "src/nsfmsg_plat.c", "src/nsfmm.c", "src/nsfque.c", "src/nsftmr.c", "src/nsfabend.c", "src/nsffmt.c", "asm/nsfxq.asm", "asm/nsfstim.asm", "asm/nsftime.asm"]

# -- M1-4b Stage 0: cthread seam de-risk (issue #18 / ADR-0022) --------------
# MVS-only (host = false): proves the libc370 `cthread` seam in ISOLATION before
# any CTCI I/O is wired to it -- the exact hinge #18's fix rests on. A cthread
# subtask SVC-2-POSTs a parent ECB while the async STIMER heartbeat POSTs another,
# BOTH in one WAIT ECBLIST, over many rounds: if a normal-task SVC-2 POST into the
# executive's multi-ECB WAIT carried #18's pathology it hangs HERE. Also joins the
# subtask via CTHDTASK.termecb + cthread_detach and proves a subtask ESTAE fault
# leaves the parent alive. Needs only the STIMER seam (asm/nsfstim.asm); cthread /
# IDENTIFY / WAIT ECBLIST come from libc370 (autocalled). cthread is the first use
# in the ecosystem, so it is validated here, not assumed.
[[test]]
name = "TSTCTHR"
startup = "crt1"
host = false
sources = ["test/mvs/tstcthr.c", "asm/nsfstim.asm"]

# -- issue #21 Stage 0: the timed-wait linchpin (ADR-0025) -------------------
# MVS-only (host = false): proves ON MVS that (a) the pre-#21 nsfthr_timed_wait
# shape (timeout ECB NOT in the WAIT ECBLIST) never times out -- a pure infinite
# WAIT, the dead 500 ms CTCI self-poll behind the burst-tail stall -- and (b) the
# fixed shape (timeout ECB IN the list) fires in ~500 ms on a cthread subtask AND
# on the main task, leaving the target ECB untouched; plus the nsfthr_join bound
# (a live subtask join times out -> RETAIN instead of hanging). The pthread host
# shim always fires, so only MVS can tell the shapes apart.
[[test]]
name = "TSTTHRW"
startup = "crt1"
host = false
sources = ["test/mvs/tstthrw.c", "src/nsfthr.c", "asm/nsfstim.asm", "asm/nsftime.asm"]

# -- M2 IPv4 + ICMP ("Ping!") --------------------------------------------
# NSFCKSUM: the Internet checksum (RFC 1071) over a PBUF chain. Pinned FIRST,
# against literal vectors, before any packet code (spec 11.5). Needs only the
# PBUF type from nsfbuf.h (fabricated on the stack) -- no NSFMM/NSFBUF pools.
[[test]]
name = "TSTCKSUM"
startup = "crt1"
sources = ["test/tstcksum.c", "src/nsfcksum.c"]

# NSFIP: header validate/demux/build + routing table. Drives the IP layer over a
# capture DEVOPS (deterministic, loop not running) + one NSFHOST loopback flow.
[[test]]
name = "TSTIP"
startup = "crt1"
sources = ["test/tstip.c", "src/nsfip.c", "src/nsficmp.c", "src/nsfcksum.c", "src/nsfhost_plat.c", "src/nsfdev.c", "src/nsfbuf.c", "src/nsfsts.c", "src/nsftrc.c", "src/nsfevt.c", "src/nsfevt_plat.c", "src/nsfmm.c", "src/nsfque.c", "src/nsftmr.c", "src/nsfabend.c", "src/nsffmt.c", "asm/nsfxq.asm", "asm/nsfstim.asm", "asm/nsftime.asm"]

# NSFICM: ICMP echo responder (in-place, single-owner). Injects an echo request
# over the NSFHOST loopback and asserts a well-formed reply emerges.
[[test]]
name = "TSTICMP"
startup = "crt1"
sources = ["test/tsticmp.c", "src/nsficmp.c", "src/nsfip.c", "src/nsfcksum.c", "src/nsfhost_plat.c", "src/nsfdev.c", "src/nsfbuf.c", "src/nsfsts.c", "src/nsftrc.c", "src/nsfevt.c", "src/nsfevt_plat.c", "src/nsfmm.c", "src/nsfque.c", "src/nsftmr.c", "src/nsfabend.c", "src/nsffmt.c", "asm/nsfxq.asm", "asm/nsfstim.asm", "asm/nsftime.asm"]

# -- M3-1 socket object model (NSFSOC) + the NSFRQE frozen contract ----------
# NSFSOC: the socket table + SOCKCB, the (gen<<16)|id descriptor and its stale-fd
# guard, the PROTOPS dispatch, the parked-request pattern, and the ONE teardown
# checklist (soc_destroy). Driven over a test-only dummy PROTOPS with direct calls
# -- no event loop, no real transport (NSFREQ is M3-2, UDP is M3-3). Dual host+MVS
# so cc370 fires the SOCKCB/NSFRQE SIZE_ASSERTs and TSTSOC proves the cross-link +
# alias scan in its own link. soc_complete's app-ecb POST uses the thread seam
# (src/nsfthr.c -> nsfthr_host.c on host, which wakes via src/nsfevt_plat.c ->
# host shim); nsftrc timestamps pull the nsftime seam.
[[test]]
name = "TSTSOC"
startup = "crt1"
sources = ["test/tstsoc.c", "src/nsfsoc.c", "src/nsfthr.c", "src/nsfevt_plat.c", "src/nsfbuf.c", "src/nsfsts.c", "src/nsftrc.c", "src/nsfmm.c", "src/nsfque.c", "src/nsfabend.c", "src/nsffmt.c", "asm/nsftime.asm"]

# -- M3-2 NSFREQ: the request transport + fn dispatcher --------------------
# The Phase-1 backbone the socket API rides on: the request queue + requestECB
# (app task -> executive), the reset-before-drain + double-check-drain transport
# (ADR-0022), the complete frozen fn vocabulary, and enough handlers (INITAPI/
# TERMAPI/SOCKET/BIND/GETSOCKNAME/CLOSE + delegated RECVFROM) to prove the
# round-trip over a test-only dummy PROTOPS. Dual host+MVS: the portable
# direct-call dispatcher/teardown tests run on both (cc370 fires the NSFRQE
# SIZE_ASSERT); the pthread round-trip + lost-request stress are host-only
# (#ifndef __MVS__). The MVS transport round-trip is TSTREQM. Needs the socket
