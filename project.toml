[project]
name = "nsf370"
version = "0.1.0-dev"
type = "application"

[build]
# NSF builds warnings-clean. -I include exposes the public headers.
cflags = ["-std=gnu99", "-I", "include"]

[host]
# Fast native inner loop for the portable foundation/protocol tests
# (`make test-host`). NSF_DEBUG=1 turns on the eyecatcher / double-free /
# leak-gate checks (compiled out of production; see nsfmm.c).
cflags = ["-Wall", "-Wextra", "-DNSF_DEBUG=1", "-pthread"]
# MVS-only CSECTs swapped for their host shims so an asm-carrying [[test]] still
# builds and runs natively:
#   nsfxq   -- the exit->mainline handoff (spec 4.2): a CS loop on MVS
#              (asm/nsfxq.asm), a compiler-atomic on the host (src/nsfxq_host.c).
#   nsftime -- the platform seam (spec 7.2): STCK + PSATOLD on MVS
#              (asm/nsftime.asm), gettimeofday + 0 on the host
#              (src/nsftime_host.c). Shared by NSFTRC and NSFTMR.
#   nsfstim -- the NSFTMR arming seam (spec 6.3): STIMER REAL + POST exit on
#              MVS (asm/nsfstim.asm), a no-op that records arms/disarms for the
#              tests on the host (src/nsfstim_host.c). Host drives ticks by
#              calling nsftmr_run directly.
#   nsfevt_plat -- the NSFEVT WAIT/POST seam (spec 5.3): libc370 ecb_waitlist
#              (WAIT ECBLIST) on MVS (src/nsfevt_plat.c), a pthread cond-var on
#              the host (src/nsfevt_plat_host.c) so the loop blocks + wakes.
#   nsfmsg_plat -- the WTO emit seam (M0-8): libc370 wto() on MVS
#              (src/nsfmsg_plat.c), a capture ring + stdout on the host
#              (src/nsfmsg_host.c) so a test can read back operator output.
#   nsfopr_plat -- the operator CIB/QEDIT seam (M0-8): EXTRACT COMM + QEDIT on
#              MVS (src/nsfopr_plat.c), an injectable command queue on the host
#              (src/nsfopr_plat_host.c) so the loop test drives the whole path.
replace = { "asm/nsfxq.asm" = "src/nsfxq_host.c", "asm/nsftime.asm" = "src/nsftime_host.c", "asm/nsfstim.asm" = "src/nsfstim_host.c", "src/nsfevt_plat.c" = "src/nsfevt_plat_host.c", "src/nsfmsg_plat.c" = "src/nsfmsg_host.c", "src/nsfopr_plat.c" = "src/nsfopr_plat_host.c" }

# No mvslovers dependencies yet. libc370 is the cc370 sysroot (provided by
# the toolchain), NOT a project dependency -- same model as rexx370 v2.
[dependencies]

# -- M0-1 build-skeleton smoke test -------------------------------------
# Trivial dual (host + MVS) test proving the toolchain, the base types and
# the NSF_SIZE_ASSERT machinery compile and run (exit 0 = pass, 1 = fail).
# Complemented by the M0-2 foundation unit tests below.
[[test]]
name = "TSTSMOKE"
startup = "crt1"
sources = ["test/tstsmoke.c"]

# -- M0-2 foundation unit tests (NSFQUE / NSFXQ / NSFMM) ----------------
# NSFQUE: FIFO order, q_remove from the middle, bounded reject, Q_ENTRY.
[[test]]
name = "TSTQUE"
startup = "crt1"
sources = ["test/tstque.c", "src/nsfque.c"]

# NSFXQ: exit->mainline handoff push/drain ordering. asm/nsfxq.asm is swapped
# for src/nsfxq_host.c on the host by [host].replace above (on-MVS assembly of
# nsfxq.asm is deferred to M0-6; not part of the M0-2 CI gate).
[[test]]
name = "TSTXQ"
startup = "crt1"
sources = ["test/tstxq.c", "asm/nsfxq.asm"]

# NSFMM: alloc/exhaustion/free, counters, enforcement ABENDs, leak gate.
[[test]]
name = "TSTMM"
startup = "crt1"
sources = ["test/tstmm.c", "src/nsfmm.c", "src/nsfabend.c"]

# -- M0-3 buffer manager unit tests (NSFBUF) ---------------------------
# NSFBUF: class selection at the 192/193 boundary, field init, headroom
# prepend/reject, head/tail trim, chain-aware copyin/copyout, chaining, and
# the two-pool leak gate (buf_free of a mixed chain returns both pools to
# baseline). Links NSFMM + nsf_abend (buf_free routes through mm_free).
[[test]]
name = "TSTBUF"
startup = "crt1"
sources = ["test/tstbuf.c", "src/nsfbuf.c", "src/nsfmm.c", "src/nsfabend.c"]

# -- M0-4 trace + statistics unit tests (NSFTRC / NSFSTS) --------------
# NSFTRC: flag gating through the TRC macro (suppress / record), over-long
# text truncation into the 128 B entry, oldest-first ring wrap with correct
# cursor/count, hexdump formatting, and the NSFTRACE eyecatcher. Links the
# platform seam (asm/nsftime.asm -> src/nsftime_host.c on the host).
[[test]]
name = "TSTTRC"
startup = "crt1"
sources = ["test/tsttrc.c", "src/nsftrc.c", "asm/nsftime.asm"]

# NSFSTS: distinct counter registration, STS_INC/STS_ADD, registry overflow,
# reset-to-zero, and the component+name+value render into a caller buffer.
[[test]]
name = "TSTSTS"
startup = "crt1"
sources = ["test/tststs.c", "src/nsfsts.c"]

# -- M0-5 timer manager unit tests (NSFTMR) ----------------------------
# NSFTMR: sorted delta-queue insertion order + successor bookkeeping, in-order
# firing as ticks advance, cancel-from-the-middle, restart of a pending timer,
# idempotent cancel, and nsftmr_run re-arm/disarm via the platform-seam probe.
# The arming seam asm/nsfstim.asm is swapped for src/nsfstim_host.c on the host
# ([host].replace above); the host drives ticks by calling nsftmr_run directly.
[[test]]
name = "TSTTMR"
startup = "crt1"
sources = ["test/tsttmr.c", "src/nsftmr.c", "src/nsfque.c", "asm/nsfstim.asm"]

# NSFTMR timer-accuracy job -- the ADR-0011 gate (spec 6.3). MVS-only: it MEASURES
# the STIMER timebase with a task-synchronous STIMER WAIT (test/asm/tststmw.asm),
# timing each 100 ms interval with STCK (asm/nsftime.asm). Standalone: decoupled
# from nsftmr_run AND from the async STIMER-REAL + POST-exit seam (asm/nsfstim.asm,
# whose live run is an M0-6 task). host = false -> skipped by test-host; runs under
# test-mvs and PASSes only if mean in [90,110] ms and no interval > 200 ms.
[[test]]
name = "TSTTMACC"
startup = "crt1"
host = false
sources = ["test/mvs/tsttmacc.c", "asm/nsftime.asm", "test/asm/tststmw.asm"]

# -- M0-6 event dispatcher / main loop (NSFEVT) ------------------------
# NSFEVT: FIFO dispatch order, the drain budget preventing timer starvation, the
# NSFXQ handoff drained from a pthread-simulated exit, and the shutdown leak
# gate. Portable loop + the WAIT/POST seam (src/nsfevt_plat.c swapped for the
# pthread cond-var host shim by [host].replace); timer + xq seams swapped too.
[[test]]
name = "TSTEVT"
startup = "crt1"
sources = ["test/tstevt.c", "src/nsfevt.c", "src/nsfevt_plat.c", "src/nsfmm.c", "src/nsfque.c", "src/nsfabend.c", "src/nsftmr.c", "asm/nsfstim.asm", "asm/nsfxq.asm"]

# NSFEVT on-MVS validation (host = false): the loop WAITs on {timerECB, stopECB},
# the async STIMER exit (asm/nsfstim.asm NSFTMEXP) POSTs timerECB and re-arms, the
# loop observes N timer cycles at ~100 ms, then a simulated stop shuts it down
# cleanly. This is where the async STIMER exit is proven on 3.8j (CC 0 vs S0C6).
[[test]]
name = "TSTEVTM"
startup = "crt1"
host = false
sources = ["test/mvs/tstevtm.c", "src/nsfevt.c", "src/nsfevt_plat.c", "src/nsfmm.c", "src/nsfque.c", "src/nsfabend.c", "src/nsftmr.c", "asm/nsfstim.asm", "asm/nsfxq.asm", "asm/nsftime.asm"]

# -- M0-7 configuration parser (NSFCFG) --------------------------------
# NSFCFG: the PROFILE.TCPIP parser + immutable NSFCFG output struct, driven
# against the test/cfg/ corpus (valid + one broken profile per error class) via
# cfg_load (which also exercises the fopen/fread wrapper). Every statement type
# parses to the expected values; each broken profile asserts rejection with the
# NSF7xx code AND the exact 1-based line; plus dotted-decimal edge cases and
# charset-transparent (code-page-independent) case folding. Pure portable C --
# no asm, no MVS services -- so it runs host + MVS unchanged.
[[test]]
name = "TSTCFG"
startup = "crt1"
sources = ["test/tstcfg.c", "src/nsfcfg.c"]

# -- M0-8 operator dispatcher + startup sequencing (NSFOPR / NSFSTC) -----
# NSFOPR: the portable MODIFY command dispatcher (DISPLAY/STATS/TRACE/STOP/HELP)
# and the operator path THROUGH the real loop -- the host CIB seam
# (src/nsfopr_plat.c -> src/nsfopr_plat_host.c) + WTO seam (src/nsfmsg_plat.c ->
# src/nsfmsg_host.c) are swapped by [host].replace, so a test injects a command,
# posts the console ECB, and asserts evt_mainloop drained + dispatched + shut
# down clean. Pulls the executive + foundation it drives.
[[test]]
name = "TSTOPR"
startup = "crt1"
sources = ["test/tstopr.c", "src/nsfopr.c", "src/nsfopr_plat.c", "src/nsfmsg.c", "src/nsfmsg_plat.c", "src/nsfstc.c", "src/nsfevt.c", "src/nsfevt_plat.c", "src/nsftrc.c", "src/nsfsts.c", "src/nsfbuf.c", "src/nsftmr.c", "src/nsfmm.c", "src/nsfque.c", "src/nsfabend.c", "asm/nsfxq.asm", "asm/nsfstim.asm", "asm/nsftime.asm"]

# NSFSTC: the NSFCFG->component-init wiring -- trace-flag mapping, NSFPOOL count
# resolution, cross-statement referential integrity (spec 14.5), and
# nsf_init_from_cfg's success (pools created, leak gate) + refuse-to-start
# failure path (no partial state). Pure portable C over real cfg_parse output.
[[test]]
name = "TSTSTC"
startup = "crt1"
sources = ["test/tststc.c", "src/nsfstc.c", "src/nsfcfg.c", "src/nsftrc.c", "src/nsfbuf.c", "src/nsfmm.c", "src/nsfabend.c", "asm/nsftime.asm", "asm/nsfstim.asm"]

# NSFSTC on-MVS component validation (host = false): parse an embedded profile,
# wire it into the component inits on real 3.8j (EBCDIC PDS-independent path,
# real mm_pool_create), allocate + free a buffer, and prove the leak gate + the
# ESTAE establish/delete both link and run on MVS. The full S NSF / F NSF,* /
# P NSF / induced-ABEND-percolate flow is the PROC-driven operator validation
# (jcl/NSFPROC.jcl), which a batch RC test cannot observe.
[[test]]
name = "TSTSTCM"
startup = "crt1"
host = false
sources = ["test/mvs/tststcm.c", "src/nsfstc.c", "src/nsfcfg.c", "src/nsfmsg.c", "src/nsfmsg_plat.c", "src/nsfevt.c", "src/nsfevt_plat.c", "src/nsftrc.c", "src/nsfsts.c", "src/nsfbuf.c", "src/nsftmr.c", "src/nsfmm.c", "src/nsfque.c", "src/nsfabend.c", "asm/nsfxq.asm", "asm/nsfstim.asm", "asm/nsftime.asm"]

# -- M0-8 the NSF started task (first production load module) ------------
# The executive: init (config-driven) -> event loop -> MODIFY/STOP -> shutdown,
# under ESTAE. src/nsfmain.c owns main() + the ESTAE recovery C function; it is
# MVS-only (uses the console/ESTAE seams), so it is not in any host [[test]].
# The MVS-side seams (asm/*, *_plat) link as-is here (no [host].replace on a
# module build). Deployed via jcl/NSFPROC.jcl (S NSF).
[[module]]
name = "NSF"
startup = "crt1"
sources = ["src/nsfmain.c", "src/nsfstc.c", "src/nsfopr.c", "src/nsfopr_plat.c", "src/nsfmsg.c", "src/nsfmsg_plat.c", "src/nsfevt.c", "src/nsfevt_plat.c", "src/nsftrc.c", "src/nsfsts.c", "src/nsfbuf.c", "src/nsftmr.c", "src/nsfmm.c", "src/nsfque.c", "src/nsfcfg.c", "src/nsfabend.c", "asm/nsfxq.asm", "asm/nsfstim.asm", "asm/nsftime.asm"]

# `make deploy` target load library. Matches the ecosystem convention
# (HTTPD.LINKLIB / UFSD.LINKLIB) rather than the {HLQ}.{NAME}.{VRM}.LINKLIB
# default, so the STC PROC's STEPLIB (jcl/NSFPROC.jcl) references a stable DSN.
[deploy]
target = "NSF.LINKLIB"

[release]
version_files = ["VERSION"]
